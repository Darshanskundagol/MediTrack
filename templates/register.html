<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Meditrack</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-split">
    <div class="auth-panel-left">
      <div class="auth-brand">
        <div class="auth-logo"><i class="bi bi-capsule-pill"></i></div>
        <h1 class="auth-brand-name">Meditrack</h1>
        <p class="auth-brand-tag">AI-Powered Expiry Risk Intelligence</p>
      </div>
      <div class="auth-deco">
        <div class="deco-ring r1"></div><div class="deco-ring r2"></div><div class="deco-ring r3"></div>
      </div>
    </div>

    <div class="auth-panel-right">
      <div class="auth-form-wrap">
        <h2 class="form-heading">Create account</h2>
        <p class="form-sub">Join the Meditrack platform</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for cat, msg in messages %}
            <div class="auth-alert auth-alert-{{ cat }}">{{ msg }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.register') }}">
          <div class="form-group-custom">
            <label>Username</label>
            <div class="input-icon-wrap">
              <i class="bi bi-person-fill input-icon"></i>
              <input type="text" name="username" placeholder="Choose a username" required>
            </div>
          </div>
          <div class="form-group-custom">
            <label>Email</label>
            <div class="input-icon-wrap">
              <i class="bi bi-envelope-fill input-icon"></i>
              <input type="email" name="email" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="form-group-custom">
            <label>Password</label>
            <div class="input-icon-wrap">
              <i class="bi bi-lock-fill input-icon"></i>
              <input type="password" name="password" id="pwd1" placeholder="Create password" required>
              <button type="button" class="pwd-toggle" onclick="togglePwd('pwd1',this)"><i class="bi bi-eye-fill"></i></button>
            </div>
          </div>
          <div class="form-group-custom">
            <label>Confirm Password</label>
            <div class="input-icon-wrap">
              <i class="bi bi-shield-lock-fill input-icon"></i>
              <input type="password" name="confirm_password" id="pwd2" placeholder="Repeat password" required>
            </div>
          </div>
          <button type="submit" class="btn-auth">Create Account <i class="bi bi-arrow-right"></i></button>
        </form>
        <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
      </div>
    </div>
  </div>
  <script>
    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      if (el.type === 'password') { el.type = 'text'; btn.innerHTML = '<i class="bi bi-eye-slash-fill"></i>'; }
      else { el.type = 'password'; btn.innerHTML = '<i class="bi bi-eye-fill"></i>'; }
    }
  </script>
</body>
</html>
